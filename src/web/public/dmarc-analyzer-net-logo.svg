  <!-- Envelope flap -->
  <polyline points="238,65 260,83 282,65" fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- DMARC wordmark -->
  <text x="312" y="93" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="44" font-weight="700" fill="#0F172A" letter-spacing="-1">DMARC</text>
  <!-- ANALYZER subtitle -->
  <text x="314" y="114" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#64748B" letter-spacing="4.5">ANALYZER</text>
  <!-- .NET badge -->
