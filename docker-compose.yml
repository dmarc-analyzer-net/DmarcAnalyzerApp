services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dmarc-analyzer-net:dev
    environment:
      APP_MODE: api
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=dmarc_analyzer;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  worker:
    image: dmarc-analyzer-net:dev
    environment:
      APP_MODE: worker
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=dmarc_analyzer;Username=postgres;Password=postgres
      Worker__ScheduleIntervalSeconds: 15
      Worker__MaxMessagesPerSync: 50
      Worker__MaxRetryAttempts: 3
      Worker__RetryBaseDelaySeconds: 2
      Worker__StaleRunTimeoutMinutes: 20
      Worker__SyncRunTimeoutMinutes: 10
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dmarc_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
